name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run repository validator
        run: python scripts/validate_storybook_codex.py

      - name: Run demo parser tests
        run: python demo/test_build.py

      - name: Rebuild demo data (catches parser regressions)
        run: python demo/build.py
