interface:
  display_name: "Storybook Codex"
  short_description: "Create, document, compose, update, review, and audit Storybook stories"
  icon_small: "./assets/storybook-codex-small.svg"
  icon_large: "./assets/storybook-codex-logo.svg"
  brand_color: "#F05A28"
